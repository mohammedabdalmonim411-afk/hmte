project_name: HTE Project Complete Audit and Fix
goal: 审计并修复所有问题，使项目达到GitHub开源完美状态，并确保其他用户能强制启用Mavis

phases:
  - id: phase_1_content_scan
    name: 扫描所有内容错误
    objective: |
      扫描整个项目，找出所有内容错误：
      1. "Claude-native" 或 "Claude原生" 的错误描述
      2. HTE vs HMTE 命名不一致（统一为HTE）
      3. Mavis商标声明（需要验证是否有证据）
      4. 任何其他明显的事实错误
    
    inputs:
      - 项目路径: /f/AI/mavis-team-engine
      - 需要检查的文件类型: markdown, shell, python
    
    outputs:
      - 错误清单: .phase_control/evidence/phase_1_errors.json
      - 每个错误的位置（文件:行号）
      - 错误类型分类
      - 建议的修复方案
    
    acceptance_criteria:
      - 必须扫描所有 .md 文件
      - 必须列出每个错误的具体位置
      - 必须提供修复建议
      - 不能遗漏明显错误
    
    required_evidence:
      - search_results: 每种错误类型的搜索结果
      - error_list: 结构化的错误清单
      - file_samples: 错误上下文的代码片段
    
    max_retries: 2
    timeout_minutes: 10

  - id: phase_2_verify_claims
    name: 验证商标声明
    objective: |
      验证README中关于"Mavis是MiniMax商标"的声明是否有证据支持。
      如果没有证据，这是虚假陈述，必须删除或改写为准确描述。
    
    inputs:
      - README.md 中的商标声明部分
      - 需要验证的claim: "Mavis is a registered trademark of MiniMax Technology Limited"
    
    outputs:
      - 验证结果: .phase_control/evidence/phase_2_trademark_verification.json
      - 证据来源（如果有）
      - 建议的修正文本
    
    acceptance_criteria:
      - 必须明确说明是否找到证据
      - 如果没有证据，必须标记为"无法验证的声明"
      - 必须提供替代的准确描述
    
    required_evidence:
      - search_attempts: 尝试查找证据的记录
      - findings: 查找结果
      - recommendation: 修正建议
    
    max_retries: 1
    timeout_minutes: 5

  - id: phase_3_fix_content_errors
    name: 修复所有内容错误
    objective: |
      根据Phase 1和Phase 2的发现，修复所有内容错误：
      1. 删除或修正"Claude-native"描述
      2. 统一命名为HTE（不是HMTE）
      3. 修正或删除Mavis商标声明
      4. 修复其他事实错误
    
    inputs:
      - phase_1_errors.json
      - phase_2_trademark_verification.json
    
    outputs:
      - 修复清单: .phase_control/evidence/phase_3_fixes.json
      - 修改的文件列表
      - 修改前后对比
    
    acceptance_criteria:
      - 所有Phase 1发现的错误必须修复
      - 命名必须统一为HTE
      - 商标声明必须准确或删除
      - 不能引入新错误
    
    required_evidence:
      - files_modified: 修改的文件列表
      - diff_summary: 修改摘要
      - verification: 修复后的验证结果
    
    max_retries: 2
    timeout_minutes: 15

  - id: phase_4_create_enforcement_guide
    name: 创建Mavis强制使用指南
    objective: |
      创建一个清晰的文档，告诉其他Hermes用户如何配置他们的系统，
      使其强制使用Mavis而不是假用。这是项目的核心价值。
      
      文档必须包含：
      1. 为什么需要强制（AI会撒谎、偷懒）
      2. 如何配置Hermes memory
      3. 如何验证Mavis是否真正生效
      4. 常见的"假用"模式及如何识别
    
    inputs:
      - 当前的SKILL.md（已有强制规则）
      - HERMES.md（已有MUST规则）
    
    outputs:
      - 新文档: MAVIS_ENFORCEMENT.md
      - 位置: 项目根目录
      - 内容: 完整的强制使用指南
    
    acceptance_criteria:
      - 文档必须清晰易懂
      - 必须包含具体的配置步骤
      - 必须包含验证方法
      - 必须解释"假用"的危害
    
    required_evidence:
      - document_content: 完整文档内容
      - examples: 配置示例
      - verification_steps: 验证步骤
    
    max_retries: 2
    timeout_minutes: 10

  - id: phase_5_update_readme
    name: 更新README突出强制使用
    objective: |
      在README中突出显示Mavis强制使用的重要性。
      在Quick Start部分添加"如何确保Mavis真正生效"的说明。
    
    inputs:
      - 当前的README.md
      - MAVIS_ENFORCEMENT.md
    
    outputs:
      - 更新后的README.md
      - 修改摘要: .phase_control/evidence/phase_5_readme_updates.json
    
    acceptance_criteria:
      - Quick Start必须包含强制使用说明
      - 必须链接到MAVIS_ENFORCEMENT.md
      - 必须警告"假用"的风险
      - 不能破坏现有结构
    
    required_evidence:
      - readme_diff: README修改对比
      - new_sections: 新增章节内容
    
    max_retries: 2
    timeout_minutes: 10

  - id: phase_6_final_verification
    name: 最终验证
    objective: |
      全面验证项目是否达到GitHub开源完美状态：
      1. 无内容错误
      2. 命名一致
      3. 无虚假声明
      4. 有完整的强制使用指南
      5. README清晰准确
      6. 无敏感信息
    
    inputs:
      - 所有修改后的文件
      - 所有前序阶段的evidence
    
    outputs:
      - 最终审计报告: .phase_control/evidence/phase_6_final_audit.json
      - 问题清单（如果有）
      - 开源就绪度评分
    
    acceptance_criteria:
      - 所有内容错误必须为0
      - 命名一致性100%
      - 无虚假声明
      - 强制使用指南完整
      - 评分必须>=95/100
    
    required_evidence:
      - scan_results: 全面扫描结果
      - issue_count: 问题数量
      - readiness_score: 就绪度评分
      - recommendation: 是否可以发布
    
    max_retries: 1
    timeout_minutes: 15

  - id: phase_7_commit_and_publish
    name: 提交并发布
    objective: |
      将所有修改提交到Git，创建新的GitHub仓库，发布v1.0.0。
      仓库名称: hte（不是hmte）
    
    inputs:
      - 所有修改后的文件
      - phase_6_final_audit.json（必须PASS）
    
    outputs:
      - Git commit SHA
      - GitHub仓库URL
      - Release URL
    
    acceptance_criteria:
      - 所有修改必须已提交
      - 仓库必须创建成功
      - Release v1.0.0必须发布
      - Issues和Discussions必须启用
      - Topics必须添加
    
    required_evidence:
      - commit_sha: 提交哈希
      - repo_url: 仓库URL
      - release_url: Release URL
      - repo_settings: 仓库配置截图
    
    max_retries: 2
    timeout_minutes: 10

metadata:
  created_at: "2026-05-27T16:10:00Z"
  created_by: master-planner
  priority: critical
  estimated_duration_minutes: 75
  success_criteria: |
    项目达到GitHub开源完美状态：
    - 内容准确无误
    - 命名统一一致
    - 有完整的Mavis强制使用指南
    - 其他用户能够配置强制使用
    - 仓库配置完整
